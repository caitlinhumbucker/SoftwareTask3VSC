{% extends "base.html" %}
{% block content %}
{% if session['user_id'] %}
<h1 class="centered">Recipe Score Calculator</h1>

<div class="entry2">
    <form method="post" action="{{ url_for('building') }}">
        <label for="ingredients">Select Ingredients:</label>
        <select name="ingredients" id="ingredients" multiple required>
            {% for ingredient in ingredients %}
            <option value="{{ ingredient.id }}" {% if ingredient.id|string in selected_ids %}selected{% endif %}>
                {{ ingredient.title }} (Score: {{ ingredient.nutrition_score }})
            </option>
            {% endfor %}
        </select>
        <button type="submit">Calculate Score</button>
    </form>

    {% if average_score is not none %}
    <div class="stats-grid">
        <div class="stat-block">
            <h4>Average Nutrition Score</h4>
            <p>{{ average_score }}/5</p>
        </div>
    </div>
    {% endif %}
</div>
{% endif %}
{% endblock %}
